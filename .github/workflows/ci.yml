name: CI

# PR·main 푸시마다 lint → typecheck → build 를 돌려 회귀를 잡습니다.
# DB 접속이 필요한 마이그레이션·E2E 는 별도 워크플로우(db-migrate.yml 등)가 담당.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        env:
          # Next 14 가 "collecting page data" 단계에서 페이지 모듈을 import 하면서
          # lib/db/index.ts 의 top-level throw 가 발동해 빌드가 깨짐.
          # 이 단계에서 실제 쿼리는 돌지 않으므로 더미 URL 로 충분.
          # 근본 해결(lazy db connection) 은 별도 chore 이슈에서 진행.
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: npm run build
